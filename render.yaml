databases:
  - name: fintrack-db
    plan: free
    databaseName: fintrack
    user: fintrack

services:
  - type: web
    name: fintrack-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: fintrack-db
          property: connectionURI
      - key: CORS_ALLOWED_ORIGINS
        value: "https://fintrack-dashboard.vercel.app"
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py loaddata fixtures/demo_data.json"
    startCommand: "gunicorn fintrack.wsgi:application --bind 0.0.0.0:$PORT"
    healthCheckPath: /api/health/
    plan: free
